name: Build and Deploy

on:
  push:
    branches:
      - master
      - develop
  # When the IG sync workflow commits new posts via GITHUB_TOKEN, the
  # resulting push doesn't trigger this workflow — GitHub blocks
  # bot-pushed events from chaining workflows to prevent infinite loops.
  # Listen for the sync workflow's completion so the new
  # _data/instagram.yml ships to live without a manual nudge.
  workflow_run:
    workflows: ["Sync Instagram Stills"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  jekyll-build:
    runs-on: ubuntu-latest
    # workflow_run fires on both success and failure. Skip the deploy chain
    # entirely if the sync didn't actually succeed — no point shipping a
    # broken sync (or worse, a partial commit) to the live site.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 📂 set up
        uses: actions/checkout@v4
        with:
          # Full history (not the default shallow depth=1). Required so
          # the file_mtime Liquid filter in _plugins/file_mtime.rb can
          # find the last commit that touched each file (e.g. the
          # "Gear List - Updated <month>" button on the homepage reads
          # git log -1 for img/AlexWalker_fullgearlist.pdf). With a
          # shallow clone, git log returns empty for any file that
          # wasn't changed in the very latest commit, and the filter
          # would fall through to File.mtime — which in CI is the
          # checkout instant, advancing the displayed month every push.
          fetch-depth: 0

      - name: 💎 set up ruby
        uses: ruby/setup-ruby@v1
        with:
          # Match the .ruby-version pinned by local development. Bundler is
          # resolved from Gemfile.lock by setup-ruby when bundler-cache is on,
          # so no explicit bundler pin is needed here.
          ruby-version: 3.3.6
          bundler-cache: true     # bundle install + caches /vendor/bundle

      - name: 🔨 build site
        run: bundle exec jekyll build

      - name: cache HTMLProofer
        id: cache-htmlproofer
        uses: actions/cache@v4
        with:
          path: tmp/.htmlproofer
          key: ${{ runner.os }}-htmlproofer-v2

      - name: run tests
        run: |
          bundle exec htmlproofer ./_site \
            --only-4xx \
            --assume-extension .html \
            --no-enforce-https \
            --ignore-missing-alt \
            --ignore-files '/_site/admin/' \
            --ignore-urls '/vimeo\.com/,/twitter\.com/,/instagram\.com/,/letterboxd\.com/,/fonts\.googleapis\.com/,/fonts\.gstatic\.com/,/nexus\.tail1c6f41\.ts\.net/' \
            --swap-urls 'https?\:\/\/alexwalker\.co:' \
            --cache '{ "timeframe": { "external": "30d" } }'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: [jekyll-build]
    # Deploy to live on:
    #  - direct pushes to master
    #  - manual workflow_dispatch runs (defaults to master in the UI)
    #  - successful runs of the Sync Instagram Stills workflow (which
    #    targets master). workflow_run events report github.ref as the
    #    default branch, so the original push branch check would always
    #    pass — make it explicit.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run'
    steps:
      - name: Download build result
        uses: actions/download-artifact@v4
        with:
          name: site

      - name: Setup SSH Keys and known_hosts
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan ssh.nickwalker.us >> ~/.ssh/known_hosts
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: 🚀 deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: rsync -havz * www-data@ssh.nickwalker.us:/var/www/alexwalker.co/

      - name: purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_KEY: ${{ secrets.CLOUDFLARE_KEY }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [jekyll-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Download build result
        uses: actions/download-artifact@v4
        with:
          name: site

      - name: Setup SSH Keys and known_hosts
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan ssh.nickwalker.us >> ~/.ssh/known_hosts
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: 🚀 deploy to staging
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: rsync -havz --delete ./ www-data@ssh.nickwalker.us:/var/www/testing.alexwalker.co/ --exclude=/.well-known

      - name: purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_KEY: ${{ secrets.CLOUDFLARE_KEY }}
