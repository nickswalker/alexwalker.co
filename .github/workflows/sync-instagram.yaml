name: Sync Instagram Stills

on:
  schedule:
    # Daily at midnight Central. GitHub cron is UTC-only, so this is
    # 05:00 UTC = 00:00 CDT during daylight saving (Mar–Nov, most of the
    # year) and shifts to 23:00 CST during standard time. Picking the
    # DST anchor since that's the majority window.
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow colorthief PyYAML

      - name: Sync Instagram stills
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_REFRESH_PAT: ${{ secrets.IG_REFRESH_PAT }}
        run: python scripts/sync_instagram.py

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add img/instagram _data/instagram.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync Instagram stills"
            git push
          fi
